<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VGT Text-to-Sign</title>
  <style>
    :root{--bg:#030712;--panel:#0b1220;--panel2:#0f172a;--text:#e2e8f0;--muted:#94a3b8;--accent:#38bdf8;--warn:#f59e0b;--ok:#22c55e}
    *{box-sizing:border-box}
    body{margin:0;background:radial-gradient(1200px 600px at 50% -200px,#1e293b 0%,#030712 60%);color:var(--text);font-family:Inter,system-ui,Arial,sans-serif}
    .app{width:min(1500px,100vw);margin:0 auto;padding:16px}
    .top{display:grid;gap:12px;background:var(--panel);border:1px solid #1f2937;border-radius:14px;padding:14px}
    h1{margin:0;font-size:clamp(28px,3vw,42px)}
    .lead{margin:0;color:var(--muted);font-size:15px}
    textarea{width:100%;height:84px;border:1px solid #334155;background:#020617;color:#e2e8f0;border-radius:12px;padding:12px;font-size:18px}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    button{border:1px solid #334155;background:#111827;color:#e5e7eb;border-radius:10px;padding:9px 14px;font-size:15px;cursor:pointer}
    #convert{background:var(--accent);color:#082f49;border-color:#67e8f9;font-weight:700}
    label{font-size:14px;color:#cbd5e1}
    input[type="range"]{accent-color:var(--accent)}
    #status{font-size:15px;color:#cbd5e1}
    .warn{color:var(--warn);font-size:14px}
    .ok{color:var(--ok);font-size:14px}
    #stage{display:grid;grid-template-columns:minmax(0,1fr) 320px;gap:12px;margin-top:12px}
    .video-wrap{position:relative;background:#020617;border:1px solid #334155;border-radius:14px;overflow:hidden;min-height:68vh;max-height:84vh}
    .layered-video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;background:#020617;opacity:0;transition:opacity 160ms linear}
    .layered-video.active{opacity:1}
    #avatarOverlay{position:absolute;inset:0;pointer-events:none;z-index:5}
    .video-wrap.avatar-only .layered-video,
    .video-wrap.avatar-only .layered-video.active{opacity:0 !important;visibility:visible}
    #debugHud{position:absolute;left:10px;bottom:10px;z-index:7;background:#020617dd;color:#cbd5e1;border:1px solid #334155;border-radius:8px;padding:7px 9px;font:12px/1.25 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre;display:none}
    #debugHud.show{display:block}
    .no-video{display:none;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);padding:14px 16px;color:#94a3b8;text-align:center;font-size:15px;border:1px dashed #334155;border-radius:10px;background:#020617dd}
    .no-video.show{display:block}
    .side{background:var(--panel2);border:1px solid #1f2937;border-radius:14px;padding:14px;font-size:15px}
    .side h3{margin:0 0 8px;font-size:16px}
    .videoFallback{padding:10px;border-radius:8px;background:#111827;border:1px solid #334155;font-size:12px;word-break:break-all}
    .videoFallback a{color:#7dd3fc}
    @media (max-width:1050px){#stage{grid-template-columns:1fr}.video-wrap{min-height:60vh}}
  </style>
</head>
<body>
  <main class="app">
    <section class="top">
      <h1>VGT Text-to-Sign</h1>
      <p class="lead">Deze app is ontworpen voor dove gebruikers: voer tekst in en bekijk een grote, duidelijke visuele sign-weergave (face/hand/body zijn de prioriteit).</p>
      <textarea id="input">ik help jou morgen</textarea>
      <div class="row">
        <button id="convert">Convert</button>
        <button id="play">Play</button>
        <button id="pause">Pause</button>
        <button id="step">Step</button>
        <button id="replay">Replay</button>
        <label>Speed <input type="range" id="speed" min="0.5" max="2" value="1" step="0.1"></label>
        <label>Avatar zoom <input type="range" id="avatarZoom" min="0.8" max="1.4" value="1" step="0.05"></label>
        <label><input type="checkbox" id="showDictionaryVideo" /> Toon dictionaryvideo</label>
        <label><input type="checkbox" id="debugMode" /> Debug HUD</label>
      </div>
      <div id="status">Ready.</div>
      <div id="warnings" class="warn"></div>
      <div id="fallbackSummary" class="ok"></div>
    </section>

    <section id="stage">
      <div class="video-wrap avatar-only">
        <video id="signVideoA" class="layered-video" playsinline muted preload="auto"></video>
        <video id="signVideoB" class="layered-video" playsinline muted preload="auto"></video>
        <canvas id="avatarOverlay"></canvas>
        <div id="debugHud"></div>
        <div id="noVideo" class="no-video">Geen videoclip voor dit segment (nog geen URL in de dataset).</div>
      </div>
      <aside class="side">
        <h3>Segment</h3>
        <div id="segmentMeta">-</div>
        <h3 style="margin-top:12px">Bron</h3>
        <div id="renderMode">-</div>
        <h3 style="margin-top:12px">Video-URL</h3>
        <div id="videoFallback" class="videoFallback">-</div>
      </aside>
    </section>
  </main>
  <script type="module" src="./src/app/main.js"></script>
</body>
</html>
